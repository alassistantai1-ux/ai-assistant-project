name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            aidwatch/package-lock.json

      # Root (AI assistant server)
      - name: Install root dependencies
        run: npm install

      - name: Lint root
        run: npx eslint src/ --ext .js

      # AidWatch
      - name: Install AidWatch dependencies
        working-directory: aidwatch
        run: npm install

      - name: Lint AidWatch
        run: npx eslint aidwatch/server.js --ext .js

      - name: Run AidWatch tests
        working-directory: aidwatch
        run: npm test
        env:
          NODE_ENV: test

  docker-build:
    name: Docker Build (AidWatch)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: aidwatch
        run: docker build -t aidwatch:ci .
