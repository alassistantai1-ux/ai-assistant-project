<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #f8fafc;
    --bg-panel: #ffffff;
    --bg-input: #ffffff;
    --bd: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --user-bubble: #6366f1;
    --user-text: #ffffff;
    --bot-bubble: #f1f5f9;
    --bot-text: #0f172a;
    --tool-bg: #fef3c7;
    --tool-bd: #f59e0b;
    --error-bg: #fee2e2;
    --error-bd: #ef4444;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --radius: 12px;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --bg-panel: #1e293b;
    --bg-input: #1e293b;
    --bd: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #818cf8;
    --accent-hover: #6366f1;
    --user-bubble: #6366f1;
    --user-text: #ffffff;
    --bot-bubble: #1e293b;
    --bot-text: #f1f5f9;
    --tool-bg: #292524;
    --tool-bd: #d97706;
    --error-bg: #2d1515;
    --error-bd: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background .2s, color .2s;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    height: 56px;
    border-bottom: 1px solid var(--bd);
    background: var(--bg-panel);
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: -.5px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #94a3b8; flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.connected { background: #22c55e; }
  .status-dot.error { background: #ef4444; }
  .header-status { font-size: .8rem; color: var(--text-muted); }
  .header-spacer { flex: 1; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 6px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .btn-icon:hover { background: var(--bd); color: var(--text); }
  .btn-new-chat {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 6px 12px;
    font-size: .8rem; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .btn-new-chat:hover { background: var(--accent-hover); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--bd);
    background: var(--bg-panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: width .25s;
  }
  .sidebar.collapsed { width: 0; border: none; overflow: hidden; }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--bd);
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .connectors-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .connector-card {
    border: 1px solid var(--bd);
    border-radius: var(--radius);
    padding: 12px;
    background: var(--bg);
    transition: border-color .15s;
  }
  .connector-card.connected { border-color: var(--accent); }
  .connector-name {
    font-size: .875rem; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .connector-desc { font-size: .75rem; color: var(--text-muted); margin-top: 4px; }
  .connector-fields { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .connector-fields input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--bd);
    border-radius: 6px;
    background: var(--bg-input);
    color: var(--text);
    font-size: .8rem;
    outline: none;
  }
  .connector-fields input:focus { border-color: var(--accent); }
  .connector-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-connect {
    flex: 1; padding: 5px 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    font-size: .75rem; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .btn-connect:hover { background: var(--accent-hover); }
  .btn-disconnect {
    padding: 5px 10px;
    background: none; color: #ef4444;
    border: 1px solid #ef4444; border-radius: 6px;
    font-size: .75rem; font-weight: 600; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-disconnect:hover { background: #ef4444; color: #fff; }
  .badge-connected {
    font-size: .65rem; background: #dcfce7; color: #15803d;
    padding: 2px 6px; border-radius: 99px; font-weight: 700;
  }
  [data-theme="dark"] .badge-connected { background: #14532d; color: #4ade80; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    color: var(--text-muted);
    padding: 40px;
  }
  .empty-icon { font-size: 3rem; }
  .empty-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: .9rem; max-width: 360px; line-height: 1.6; }

  /* ── Message bubbles ── */
  .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem; font-weight: 700; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--user-bubble); color: #fff; }
  .msg.bot .avatar { background: var(--bd); color: var(--text-muted); }
  .bubble {
    padding: 10px 14px; border-radius: 16px; line-height: 1.55;
    font-size: .9rem; white-space: pre-wrap; word-break: break-word;
    box-shadow: var(--shadow);
  }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; }

  .msg.bot .bubble.streaming::after {
    content: '▋';
    animation: blink .7s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Tool call cards */
  .tool-call {
    align-self: flex-start;
    background: var(--tool-bg);
    border: 1px solid var(--tool-bd);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: .78rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text);
    max-width: 80%;
  }
  .tool-call-label { font-weight: 700; color: #92400e; margin-bottom: 4px; }
  [data-theme="dark"] .tool-call-label { color: #fbbf24; }
  .tool-call pre { white-space: pre-wrap; word-break: break-word; opacity: .85; }

  /* Error message */
  .msg-error {
    align-self: center;
    background: var(--error-bg);
    border: 1px solid var(--error-bd);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: .82rem;
    color: #dc2626;
  }
  [data-theme="dark"] .msg-error { color: #f87171; }

  /* ── Input bar ── */
  .input-bar {
    border-top: 1px solid var(--bd);
    padding: 16px 20px;
    background: var(--bg-panel);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--bd);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 4px 8px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: .9rem;
    resize: none;
    line-height: 1.5;
    max-height: 140px;
    padding: 6px 4px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-muted); }
  .btn-send {
    width: 38px; height: 38px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 9px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, opacity .15s;
  }
  .btn-send:hover { background: var(--accent-hover); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 8px 16px; border-radius: 20px; font-size: .82rem; font-weight: 600;
    z-index: 999; animation: slideUp .25s ease; pointer-events: none;
  }
  @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

  /* ── Typing indicator ── */
  .typing-indicator {
    display: flex; align-items: center; gap: 4px; padding: 10px 14px;
    background: var(--bot-bubble); border-radius: var(--radius) var(--radius) var(--radius) 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Message timestamp ── */
  .msg-time { font-size: .72rem; color: var(--text-muted); margin-top: 4px; opacity: .7; }

  /* ── Copy button ── */
  .msg-actions { display: flex; gap: 6px; margin-top: 4px; }
  .btn-copy {
    font-size: .72rem; color: var(--text-muted); background: none; border: 1px solid var(--bd);
    border-radius: 6px; padding: 2px 8px; cursor: pointer; transition: background .15s;
  }
  .btn-copy:hover { background: var(--bd); color: var(--text); }

  /* ── Code blocks in bubbles ── */
  .bubble pre { margin: 8px 0; border-radius: 8px; overflow-x: auto; }
  .bubble code:not(pre code) { background: var(--bd); padding: 2px 5px; border-radius: 4px; font-size: .87em; }
  .bubble p + p { margin-top: 8px; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 2px 0; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .sidebar { width: 100%; position: absolute; top: 56px; bottom: 0; z-index: 20; transform: translateX(-100%); transition: transform .25s; }
    .sidebar.open { transform: translateX(0); }
    .msg, .tool-call { max-width: 95%; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">✦ AI Assistant</div>
  <div class="status-dot" id="statusDot"></div>
  <div class="header-status" id="statusText">Connecting…</div>
  <div class="header-spacer"></div>
  <button class="btn-new-chat" id="btnNewChat" title="New conversation">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    New Chat
  </button>
  <button class="btn-icon" id="btnSidebar" title="Toggle accounts panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
  </button>
  <button class="btn-icon" id="btnTheme" title="Toggle dark mode">
    <svg id="iconTheme" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar: account connectors -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">Account Connections</div>
    <div class="connectors-list" id="connectorsList">
      <div style="color:var(--text-muted);font-size:.82rem;padding:8px">Connecting to server…</div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">AI Assistant</div>
        <div class="empty-sub">Ask me anything. Connect your accounts in the sidebar to let me take actions on your behalf.</div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="queryInput" rows="1" placeholder="Ask anything… (Shift+Enter for newline)" maxlength="8000"></textarea>
      </div>
      <button class="btn-send" id="btnSend" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:${location.port || 8765}`;

// Connector field definitions: what credentials each connector needs
const CONNECTOR_FIELDS = {
  google:  [{ key: 'access_token',   label: 'Access Token',   type: 'password' },
            { key: 'refresh_token',  label: 'Refresh Token',  type: 'password', optional: true },
            { key: 'client_id',      label: 'Client ID',      type: 'text',     optional: true },
            { key: 'client_secret',  label: 'Client Secret',  type: 'password', optional: true }],
  github:  [{ key: 'token',          label: 'Personal Access Token', type: 'password' }],
  slack:   [{ key: 'token',          label: 'Bot OAuth Token',       type: 'password' }],
  notion:  [{ key: 'token',          label: 'Integration Secret',    type: 'password' }],
  jira:    [{ key: 'host',           label: 'Host (e.g. org.atlassian.net)', type: 'text' },
            { key: 'email',          label: 'Email',                 type: 'text' },
            { key: 'apiToken',       label: 'API Token',             type: 'password' }],
  teams:   [{ key: 'accessToken',   label: 'Microsoft Graph Access Token', type: 'password' }],
};

// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
let clientId = null;
let connectedAccounts = new Set();
let isStreaming = false;
let streamingBubble = null;
let streamingText = '';
let pendingRequestId = null;

// ── DOM ───────────────────────────────────────────────────────────────────────
const $messages   = document.getElementById('messages');
const $empty      = document.getElementById('emptyState');
const $input      = document.getElementById('queryInput');
const $btnSend    = document.getElementById('btnSend');
const $statusDot  = document.getElementById('statusDot');
const $statusText = document.getElementById('statusText');
const $sidebar    = document.getElementById('sidebar');
const $connList   = document.getElementById('connectorsList');

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ai-theme', t);
  const hlCss = document.getElementById('hljs-css');
  if (hlCss) hlCss.href = t === 'dark'
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  const icon = document.getElementById('iconTheme');
  if (t === 'dark') {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
  }
}
(function() {
  const saved = localStorage.getItem('ai-theme');
  const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(saved || preferred);
})();
document.getElementById('btnTheme').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  setStatus('connecting');
  ws = new WebSocket(WS_URL);

  ws.addEventListener('open', () => {
    setStatus('connected');
    send({ type: 'list_connectors', requestId: 'init' });
  });

  ws.addEventListener('message', ({ data }) => {
    try { handleMessage(JSON.parse(data)); } catch {}
  });

  ws.addEventListener('close', () => {
    setStatus('disconnected');
    $btnSend.disabled = true;
    setTimeout(connect, 3000);
  });

  ws.addEventListener('error', () => setStatus('error'));
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function setStatus(state) {
  $statusDot.className = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'error' ? 'error' : '');
  $statusText.textContent = { connecting: 'Connecting…', connected: 'Connected', disconnected: 'Reconnecting…', error: 'Error' }[state] || state;
}

// ── Message handling ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'ping': send({ type: 'pong' }); break;

    case 'connected':
      clientId = msg.clientId;
      $btnSend.disabled = false;
      break;

    case 'connectors_list':
      connectedAccounts = new Set(msg.connected || []);
      renderConnectors(msg.available || []);
      break;

    case 'account_connected':
      connectedAccounts.add(msg.connector);
      refreshConnectors();
      showToast(`${msg.connector} connected`);
      break;

    case 'account_disconnected':
      connectedAccounts.delete(msg.connector);
      refreshConnectors();
      showToast(`${msg.connector} disconnected`);
      break;

    case 'response_start':
      streamingText = '';
      removeTypingIndicator();
      streamingBubble = appendBubble('bot', '', true);
      break;

    case 'response_delta':
      if (streamingBubble) {
        streamingText += msg.delta;
        streamingBubble.textContent = streamingText;
      }
      break;

    case 'tool_call':
      appendToolCall(msg.tool, msg.input);
      streamingText = '';
      streamingBubble = appendBubble('bot', '', true);
      break;

    case 'response_end':
      if (streamingBubble) {
        streamingBubble.classList.remove('streaming');
        if (streamingText) {
          renderMarkdown(streamingBubble, streamingText);
          appendMessageActions(streamingBubble.closest('.msg'), streamingText);
        } else {
          streamingBubble.closest('.msg')?.remove();
        }
        streamingBubble = null;
      }
      isStreaming = false;
      $btnSend.disabled = false;
      scrollToBottom();
      break;

    case 'conversation_cleared':
      showToast('Conversation cleared');
      break;

    case 'error':
      if (streamingBubble) {
        streamingBubble.closest('.msg')?.remove();
        streamingBubble = null;
      }
      appendError(msg.message || 'Unknown error');
      isStreaming = false;
      $btnSend.disabled = false;
      break;
  }
}

// ── Chat UI helpers ───────────────────────────────────────────────────────────
function hideEmpty() {
  if ($empty) $empty.style.display = 'none';
}

function fmtTime() {
  const d = new Date();
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function appendBubble(role, text, streaming = false) {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : '✦';
  const wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (streaming ? ' streaming' : '');
  if (text) bubble.textContent = text;
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = fmtTime();
  wrap.appendChild(bubble);
  wrap.appendChild(timeEl);
  msg.appendChild(avatar);
  msg.appendChild(wrap);
  $messages.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function appendMessageActions(msgEl, text) {
  if (!msgEl) return;
  const wrap = msgEl.querySelector('div');
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn-copy';
  copyBtn.textContent = 'Copy';
  copyBtn.setAttribute('aria-label', 'Copy message to clipboard');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    }).catch(() => {});
  });
  actions.appendChild(copyBtn);
  wrap.appendChild(actions);
}

function renderMarkdown(bubble, text) {
  // Basic markdown: code blocks, inline code, bold, italic, lists
  let html = escHtml(text)
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const highlighted = lang && window.hljs && hljs.getLanguage(lang)
        ? hljs.highlight(unescHtml(code), { language: lang }).value
        : escHtml(unescHtml(code));
      return `<pre><code class="hljs language-${lang || 'plaintext'}">${highlighted}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  bubble.innerHTML = `<p>${html}</p>`;
}

function unescHtml(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function showTypingIndicator() {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '✦';
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    indicator.appendChild(dot);
  }
  msg.appendChild(avatar);
  msg.appendChild(indicator);
  $messages.appendChild(msg);
  scrollToBottom();
}

function removeTypingIndicator() {
  document.getElementById('typing-indicator')?.remove();
}

function appendToolCall(name, input) {
  hideEmpty();
  const el = document.createElement('div');
  el.className = 'tool-call';
  el.innerHTML = `<div class="tool-call-label">⚙ Tool: ${escHtml(name)}</div><pre>${escHtml(JSON.stringify(input, null, 2))}</pre>`;
  $messages.appendChild(el);
  scrollToBottom();
}

function appendError(msg) {
  hideEmpty();
  const el = document.createElement('div');
  el.className = 'msg-error';
  el.textContent = '⚠ ' + msg;
  $messages.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => { $messages.scrollTop = $messages.scrollHeight; });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Connectors sidebar ────────────────────────────────────────────────────────
let availableConnectors = [];

function renderConnectors(list) {
  availableConnectors = list;
  $connList.innerHTML = '';
  for (const c of list) {
    const connected = connectedAccounts.has(c.name);
    const fields = CONNECTOR_FIELDS[c.name] || [{ key: 'token', label: 'Token', type: 'password' }];

    const card = document.createElement('div');
    card.className = 'connector-card' + (connected ? ' connected' : '');
    card.id = `card-${c.name}`;

    const fieldsHtml = fields.map(f =>
      `<input type="${f.type}" placeholder="${f.label}${f.optional ? ' (optional)' : ''}" data-key="${f.key}" autocomplete="off">`
    ).join('');

    card.innerHTML = `
      <div class="connector-name">
        ${escHtml(c.displayName)}
        ${connected ? '<span class="badge-connected">Connected</span>' : ''}
      </div>
      <div class="connector-desc">${escHtml(c.description)}</div>
      ${!connected ? `<div class="connector-fields">${fieldsHtml}</div>` : ''}
      <div class="connector-actions">
        ${!connected
          ? `<button class="btn-connect" data-name="${c.name}">Connect</button>`
          : `<button class="btn-disconnect" data-name="${c.name}">Disconnect</button>`}
      </div>
    `;
    $connList.appendChild(card);
  }

  // Event delegation for connect/disconnect
  $connList.querySelectorAll('.btn-connect').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      const card = document.getElementById(`card-${name}`);
      const credentials = {};
      card.querySelectorAll('input[data-key]').forEach(inp => {
        if (inp.value.trim()) credentials[inp.dataset.key] = inp.value.trim();
      });
      send({ type: 'connect_account', connector: name, credentials, requestId: `connect-${name}` });
    });
  });

  $connList.querySelectorAll('.btn-disconnect').forEach(btn => {
    btn.addEventListener('click', () => {
      send({ type: 'disconnect_account', connector: btn.dataset.name, requestId: `disconnect-${btn.dataset.name}` });
    });
  });
}

function refreshConnectors() {
  send({ type: 'list_connectors', requestId: 'refresh' });
}

// ── Sidebar toggle ────────────────────────────────────────────────────────────
document.getElementById('btnSidebar').addEventListener('click', () => {
  $sidebar.classList.toggle('collapsed');
  $sidebar.classList.toggle('open');
});

// ── Send query ────────────────────────────────────────────────────────────────
function sendQuery() {
  const text = $input.value.trim();
  if (!text || isStreaming) return;
  appendBubble('user', text);
  $input.value = '';
  $input.style.height = 'auto';
  isStreaming = true;
  $btnSend.disabled = true;
  pendingRequestId = 'q-' + Date.now();
  showTypingIndicator();
  send({ type: 'query', text, requestId: pendingRequestId });
}

$btnSend.addEventListener('click', sendQuery);

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuery();
  }
});

// Auto-resize textarea
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
});

// ── New conversation ──────────────────────────────────────────────────────────
document.getElementById('btnNewChat').addEventListener('click', () => {
  $messages.innerHTML = '';
  $messages.appendChild($empty);
  $empty.style.display = '';
  streamingBubble = null;
  streamingText = '';
  isStreaming = false;
  $btnSend.disabled = false;
  send({ type: 'new_conversation', requestId: 'new' });
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();
$input.focus();
</script>
